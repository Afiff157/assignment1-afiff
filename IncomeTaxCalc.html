<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Income Tax Calculator</title>
        <style>
            body { font-family: Arial, Helvetica, sans-serif; padding: 20px; line-height: 1.6; background-color: #F8F9FA; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;}
            .container { width: 100%; max-width: 400px; border: 1px solid #DDD; padding: 20px; border-radius: 10px; background-color: #FFFFFF; box-shadow: 0 4px 15px rgba(0,0,0,0.05);}
            input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box;}
            button { width: 100%; padding: 10px; background-color: #007BFF; color: white; border: none; cursor: pointer;}
            #output { margin-top: 20px; font-weight: bold; color: #D9534F;}
        </style>
    </head>

    <body>
        <div class="container">
            <h2>Income Tax Calculator</h2>
            <label>Enter Yearly Income (RM):</label>
            <input type="number" id="income" placeholder="e.g. 150000">
            <button onclick="calculateIncomeTax()">Calculate Tax</button>
            <div id="output"></div>

            <a href="Tools.html" style="display: block; text-align: center; margin-top: 25px; color: #6c757d; text-decoration: none; font-family: Arial, sans-serif; font-size: 14px;" onmouseover="this.style.color='#333'" onmouseout="this.style.color='#6c757d'">← Back to Dashboard</a>
        </div>

        <script>
            function calculateIncomeTax(){
                const income = parseFloat(document.getElementById('income').value);
                let tax = 0;

                if(isNaN(income) || income < 0){
                    alert("Please enter a vlaid income amount.");
                    return;
                }

                if(income <= 5000){
                    tax = 0;
                } else if(income <= 20000){
                    tax = 0 + (income - 5000) * 0.01;
                } else if(income <= 35000){
                    tax = 150 + (income - 20000) * 0.03;
                } else if(income <= 50000){
                    tax = 600 + (income - 35000) * 0.08;
                } else if(income <= 70000){
                    tax = 1800 + (income - 50000) * 0.13;
                } else if(income <= 100000){
                    tax = 4400 + (income - 70000) * 0.21;
                } else if(income <= 250000){
                    tax = 10700 + (income - 100000) * 0.24;
                } else if(income <= 400000){
                    tax = 46700 + (income - 250000) * 0.245;
                } else if(income <= 600000){
                    tax = 83450 + (income - 400000) * 0.25;
                } else if(income <= 1000000){
                    tax = 133450 + (income - 600000) * 0.26;
                } else if(income <= 2000000){
                    tax = 237450 + (income - 1000000) * 0.28;
                } else{
                    tax = 517450 + (income - 2000000) * 0.30;
                }

                document.getElementById('output').innerHTML = "Total Tax Amount: RM " + tax.toLocaleString(undefined, {minimumFractionDigits: 2});
            }
        </script>
    </body>
</html>
