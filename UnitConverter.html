<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Unit Converter Component</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <div class="container my-5" style="max-width: 500px;">
            <div class="card p-4 border-0 shadow-rounded-3">
                <h3 class="text-center text-warning fw-bold mb-4 text-dark">Universal Metric Converter</h3>

                <div class="mb-4">
                    <label class="form-label fw-bold">Enter Scalar Value Input:</label>
                    <input type="number" id="inputValue" class="form-control form-control-lg" placeholder="Enter number...">
                </div>

                <label class="form-label fw-bold mb-2">Select Conversion Target System:</label>
                <div class="row g-2 mb-4">
                    <div class="col-6">
                        <button class="btn btn-outline-dark w-100 py-2" onclick="transformMetric('cmToM')">Centimeters → Meters</button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-outline-dark w-100 py-2" onclick="transformMetric('mToCm')">Meters → Centimeters</button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-outline-dark w-100 py-2" onclick="transformMetric('mToKm')">Meters → Kilometers</button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-outline-dark w-100 py-2" onclick="transformMetric('kmToM')">Kilometers → Meters</button>
                    </div>
                </div>
                
                <div class="p-3 bg-dark text-white rounded text-center">
                    <span class="small text-muted d-block uppercase mb-1">Resulting Conversion Output</span>
                    <p id="conversionDisplay" class="fs-4 fw-bold mb-0">0.00</p>
                </div>

                
                <a href="Tools.html" class="btn btn-sm btn-link text-center d-block mt-3 text-secondary">← Back to Dashboard</a>
                </div>
            </div>

            <script>
                function transformMetric(mode) {
                    const val = parseFloat(document.getElementById('inputValue').value);
                    const outputParagraph = document.getElementById('conversionDisplay');

                    if (isNaN(val)) {
                        outputParagraph.innerText = "Please enter a valid numeric value";
                        return;
                    }

                    let computedValue = 0;
                    let descriptiveString = "";

                    switch(mode) {
                        case 'cmToM':
                            computedValue = val / 100;
                            descriptiveString = val + " cm = " + computedValue.toFixed(4) + " m";
                            break;
                        case 'mToCm':
                            computedValue = val * 100;
                            descriptiveString = val + " m = " + computedValue.toFixed(2) + " cm";
                            break;
                        case 'mToKm':
                            computedValue = val / 1000;
                            descriptiveString = val + " m = " + computedValue.toFixed(4) + " km";
                            break;
                        case 'kmToM':
                            computedValue = val * 1000;
                            descriptiveString = val + " km = " + computedValue.toFixed(2) + " m";
                            break;
                        default:
                            descriptiveString = "Invalid Evaluation Mode";
            }

                    outputParagraph.innerText = descriptiveString;
                }
            </script>
    </body>
</html>
